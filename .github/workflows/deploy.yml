name: Deploy to DigitalOcean

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for deployment'
        required: false
        default: 'Manual trigger'

jobs:
  pre-deploy-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r realtimeasr-en-arabic/backend/requirements.txt

      - name: Python syntax check
        run: |
          find realtimeasr-en-arabic/backend -name "*.py" -print0 | xargs -0 python -m py_compile

      - name: FastAPI app import check
        run: |
          # Use a fake key for import check
          cd realtimeasr-en-arabic && SPEECHMATICS_API_KEY="fake_key_for_import" \
          python -c "from backend.main import app; print('App imported successfully')"

  deploy:
    needs: pre-deploy-checks
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Exit immediately if a command exits with a non-zero status
            set -e
            
            echo "Starting deployment..."
            
            # Navigate to the repo root
            cd /opt/VoiceAgentDemos
            
            # Pull latest code from main
            git pull origin main
            
            # Navigate to the specific demo directory
            cd /opt/VoiceAgentDemos/realtimeasr-en-arabic
            
            # Activate virtual environment
            . .venv/bin/activate
            
            # Install dependencies
            pip install -r backend/requirements.txt
            
            # Import benchmark data automatically
            python ../scripts/import_benchmark_data.py --source ../benchmarks_source/RiyadBank_filter
            
            # Restart the systemd service (requires passwordless sudo configured)
            sudo systemctl restart realtimeasr
            
            # Wait for service to start
            sleep 3
            
            # Health check
            echo "Running health check..."
            curl --fail http://127.0.0.1:8010/health
            
            echo "Deployment successful!"
